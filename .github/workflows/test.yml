name: Test

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Tests + coverage (>= 80%)
    runs-on: windows-latest
    env:
      # Qt must run headless on the runner (SPEC 6.1 UI is not exercised here).
      QT_QPA_PLATFORM: offscreen
      PYTHONPATH: src
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      # The install set grows per phase as tests start exercising heavier modules
      # (cadquery/OCP land with the geometry phase). Kept explicit + pinned so each
      # PR's CI is fast and deterministic.
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest==8.1.1 coverage==7.14.3 pydantic==2.6.4 psutil==5.9.8

      - name: Run tests with coverage
        run: |
          python -m coverage run -m pytest tests -q
          python -m coverage report

  geometry:
    name: Geometry tests (CadQuery/OCC)
    runs-on: windows-latest
    env:
      PYTHONPATH: src
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      # Heavy native stack (cadquery + OpenCASCADE ~600 MB). Isolated in its own job so
      # the fast unit-test lane above is not slowed by it.
      - name: Install geometry stack
        run: |
          python -m pip install --upgrade pip
          pip install cadquery==2.4.0 cadquery-ocp==7.7.2 ezdxf==1.1.4 trimesh==4.1.8 reportlab==4.1.0 numpy==1.26.4 pydantic==2.6.4 pytest==8.1.1
      - name: Run geometry + sandbox-exec tests
        run: pytest tests/geometry tests/sandbox -q
