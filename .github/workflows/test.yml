name: Test

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Tests + coverage (>= 80%)
    runs-on: windows-latest
    env:
      # Qt must run headless on the runner (SPEC 6.1 UI is not exercised here).
      QT_QPA_PLATFORM: offscreen
      PYTHONPATH: src
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      # The install set grows per phase as tests start exercising heavier modules
      # (cadquery/OCP land with the geometry phase). Kept explicit + pinned so each
      # PR's CI is fast and deterministic.
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest==8.1.1 coverage==7.14.3 pydantic==2.6.4 psutil==5.9.8

      - name: Run tests with coverage
        run: |
          python -m coverage run -m pytest tests -q
          python -m coverage report

  geometry:
    name: Geometry + UI tests (CadQuery/OCC/PySide6)
    runs-on: windows-latest
    env:
      PYTHONPATH: src
      QT_QPA_PLATFORM: offscreen # UI smoke tests run headless (SPEC 6.1)
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      # Heavy native stack (cadquery + OpenCASCADE ~600 MB) plus PySide6 for UI smoke
      # tests. Isolated so the fast unit-test lane above is not slowed. VTK/pyvistaqt are
      # intentionally omitted so the viewer's software fallback (S9) is what runs.
      - name: Install geometry + UI stack
        run: |
          python -m pip install --upgrade pip
          pip install cadquery==2.4.0 cadquery-ocp==7.7.2 ezdxf==1.1.4 trimesh==4.1.8 reportlab==4.1.0 numpy==1.26.4 pydantic==2.6.4 pytest==8.1.1 PySide6==6.6.3.1
      # OpenCASCADE can segfault during interpreter shutdown on Windows AFTER the tests
      # pass, poisoning the process exit code. Judge pass/fail from the JUnit XML (written
      # at session finish, before the crash) instead of the exit code.
      - name: Run geometry + sandbox + pipeline + UI tests
        shell: bash
        run: |
          pytest tests/geometry tests/sandbox tests/pipeline tests/ui -q --junitxml=geo.xml || true
          python - <<'PY'
          import sys, xml.etree.ElementTree as ET
          root = ET.parse("geo.xml").getroot()
          suites = root.findall("testsuite") or ([root] if root.tag == "testsuite" else [])
          total = sum(int(s.get("tests", 0)) for s in suites)
          bad = sum(int(s.get("failures", 0)) + int(s.get("errors", 0)) for s in suites)
          print(f"geometry tests: total={total} failures+errors={bad}")
          sys.exit(1 if (bad or total == 0) else 0)
          PY
